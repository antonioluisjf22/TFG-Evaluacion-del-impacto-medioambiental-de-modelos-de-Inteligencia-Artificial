<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Calculadora de Carbono de IA{% endblock %}</title>

    <!-- Fonts (preconnect + preload for speed) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&family=Space+Grotesk:wght@600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons (needed immediately) -->
    <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>
    <!-- Chart.js + CountUp (defer — not needed until results) -->
    <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/countup.js@2.8.0/dist/countUp.umd.min.js"></script>
    <!-- Leaflet (defer — only needed for map tab) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- TopoJSON client (for choropleth) -->
    <script defer src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
    <!-- jsPDF (defer) -->
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    {% block extra_head %}{% endblock %}
</head>
<body>

    <header>
        <div class="header-content">
            <div class="header-left">
                <a href="/" class="header-back" title="Volver al inicio">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"/>
                    </svg>
                </a>
                <div>
                    <h1>Calculadora de Carbono <span class="header-gradient">para IA</span></h1>
                    <p class="subtitle">Impacto medioambiental de modelos de Inteligencia Artificial</p>
                </div>
            </div>
            <div style="display:flex;align-items:center;gap:12px">
                <div class="header-badge">
                    <div class="header-dot"></div>
                    <span>Realizado por Antonio Luis Jiménez de la Fuente</span>
                </div>
                <a href="/" class="button button-secondary" style="padding:8px 16px;font-size:12px;text-decoration:none" title="Volver al menú principal">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    Menú Principal
                </a>
            </div>
        </div>
    </header>

    <!-- Tabs -->
    <div class="tabs-container">
        <div class="tabs">
            <button class="tab-button active" data-tab="formulario">
                <span class="tab-icon"><i data-lucide="file-text"></i></span> Formulario
            </button>
            <button class="tab-button" data-tab="resultados">
                <span class="tab-icon"><i data-lucide="bar-chart-2"></i></span> Resultados
            </button>
            <button class="tab-button" data-tab="dashboard">
                <span class="tab-icon"><i data-lucide="trending-up"></i></span> Dashboard
            </button>
            <button class="tab-button" data-tab="comparador">
                <span class="tab-icon"><i data-lucide="scale"></i></span> Comparador
            </button>
            <button class="tab-button" data-tab="simulacion">
                <span class="tab-icon"><i data-lucide="activity"></i></span> Simulación
            </button>
            <button class="tab-button" data-tab="energy-label">
                <span class="tab-icon"><i data-lucide="tag"></i></span> Etiqueta
            </button>
            <button class="tab-button" data-tab="mapa">
                <span class="tab-icon"><i data-lucide="globe"></i></span> Mapa Global
            </button>
        </div>
    </div>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>
        // Initialize Lucide icons after DOM is ready
        document.addEventListener('DOMContentLoaded', () => { if(window.lucide) lucide.createIcons(); });
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
