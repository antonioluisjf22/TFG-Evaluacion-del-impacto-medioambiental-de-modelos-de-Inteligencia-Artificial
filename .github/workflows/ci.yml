name: CI — Tests y Verificación de Despliegue

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────────────
  # JOB 1: Suite de pruebas pytest
  # ──────────────────────────────────────────────────────────
  test:
    name: Pruebas unitarias e integración
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar suite de pruebas (excluye tests lentos)
        env:
          # Sin API key real: el sistema opera en modo offline (fallback CSV)
          ELECTRICITY_MAPS_API_KEY: ""
        run: |
          pytest testing/ -v \
            --ignore=testing/test_network_updates.py \
            -m "not slow" \
            --tb=short

  # ──────────────────────────────────────────────────────────
  # JOB 2: Verificación del build Docker
  # ──────────────────────────────────────────────────────────
  docker-build:
    name: Verificación de imagen Docker
    runs-on: ubuntu-latest
    needs: test          # Solo se ejecuta si los tests pasan

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local de la imagen (para health check)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: tfg-carbon-calculator:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Arrancar contenedor y verificar health
        run: |
          docker run -d \
            --name tfg_test \
            -p 5000:5000 \
            -e ELECTRICITY_MAPS_API_KEY="" \
            -e SECRET_KEY="ci-test-key" \
            tfg-carbon-calculator:ci

          # Esperar hasta 30 s a que la aplicación responda
          echo "Esperando que la aplicación arranque..."
          for i in $(seq 1 10); do
            if curl -sf http://localhost:5000/ > /dev/null 2>&1; then
              echo "Aplicación disponible en la iteración $i"
              break
            fi
            sleep 3
          done

          # Verificar endpoint raíz
          curl -sf http://localhost:5000/ \
            || (echo "ERROR: la landing no responde" && docker logs tfg_test && exit 1)

          # Verificar endpoint de opciones de la API
          curl -sf http://localhost:5000/api/options \
            || (echo "ERROR: /api/options no responde" && docker logs tfg_test && exit 1)

          # Verificar endpoint de health dedicado
          curl -sf http://localhost:5000/api/health \
            || (echo "ERROR: /api/health no responde" && docker logs tfg_test && exit 1)

          echo "Health check de Docker: OK"

      - name: Mostrar logs del contenedor (siempre, para diagnóstico)
        if: always()
        run: docker logs tfg_test || true

      - name: Detener y eliminar contenedor
        if: always()
        run: docker rm -f tfg_test || true

      - name: Login en GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publicar imagen en GHCR (solo en push a main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/tfg-carbon-calculator:latest
            ghcr.io/${{ github.repository_owner }}/tfg-carbon-calculator:${{ github.sha }}
          cache-from: type=gha

  # ──────────────────────────────────────────────────────────
  # JOB 3: Verificación de despliegue en Render
  # (se ejecuta solo en push a main si el secret está disponible)
  # ──────────────────────────────────────────────────────────
  render-healthcheck:
    name: Health check de Render (producción)
    runs-on: ubuntu-latest
    needs: [test, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Esperar a que Render redespliegue
        # Render tarda entre 1-3 minutos en procesar un push a main;
        # este sleep da margen antes de lanzar el health check.
        run: sleep 90

      - name: Verificar que la aplicación en Render responde
        env:
          RENDER_URL: ${{ secrets.RENDER_APP_URL }}
        run: |
          if [ -z "$RENDER_URL" ]; then
            echo "RENDER_APP_URL no configurado — omitiendo health check de Render"
            exit 0
          fi

          echo "Comprobando $RENDER_URL ..."
          curl -sf --max-time 30 "$RENDER_URL/" \
            || (echo "ERROR: la aplicación en Render no responde" && exit 1)

          curl -sf --max-time 30 "$RENDER_URL/api/options" \
            || (echo "ERROR: /api/options en Render no responde" && exit 1)

          curl -sf --max-time 30 "$RENDER_URL/api/health" \
            || (echo "ERROR: /api/health en Render no responde" && exit 1)

          echo "Health check de Render: OK"
