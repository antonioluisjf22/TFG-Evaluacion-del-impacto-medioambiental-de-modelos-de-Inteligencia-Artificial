services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      # Copia tu clave de Electricity Maps o déjala en blanco para modo offline
      - ELECTRICITY_MAPS_API_KEY=${ELECTRICITY_MAPS_API_KEY:-}
      - SECRET_KEY=${SECRET_KEY:-tfg-carbon-calculator-dev}
      - FLASK_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
